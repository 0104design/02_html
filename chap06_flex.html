<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<!--
  flexbox : 정렬 할 부모요소 안에 자식 요소를 배치하는 방식-->
<div style="display:flex;">
  <div style=" width: 100px; height: 100px; background-color: red;"></div>
  <div style=" width: 100px; height: 100px; background-color: blue;"></div>
  <div style=" width: 100px; height: 100px; background-color: orange;"></div>
</div>


<!--
  결국 큰 영역을 그리고 그 안에 요소를 배치하는 방식임
-->
<div style="width: 100%; height: 100%;">
  <header style="width: 100%; height: 80px; display: flex;">
    <div>로고자리</div>
    <div>메뉴자리</div>
    <div>로그인자리</div>
  </header>
</div>


<div style="width: 100%; height: 100%; display:flex; margin-bottom: 50px; border-bottom: 1px solid #ccc;">
  <header style="width: 100%; max-width:1200px; margin: 0 auto; height: 80px; display: flex; justify-content: space-between;">
    <div style="background-color: red;">로고자리</div>
    <div style="background-color: blue;">메뉴자리</div>
    <div style="background-color: yellow;">로드인자리</div>
  </header>
</div>




<!-- 저시츠파이 속성 : 메인 축에 대한 정렬을 뜻함.
                   : 기본 -> 가로이 메인
                       flex - start :  시작점부터 정렬
                       flex- end : 쯭점뷰터 정렬
                       sapce- between : 양 끝에 정렬 -> 나멎; 다른 여백의 크기가 같게 정렬
                       space- arond : 중앙을 기준으로 양 끝 정렬
                       center : 중앙 정렬-->





<!-- align items : 보조축에 대한 정렬
                  : 기본은 세로 축이 보조임
                  : flex-start : 시작점부터 정렬
                  : flex - end: 그끝 점부터 정렬
                  : center: 중앙 정렬
 -->
<div style="width: 100%; height: 100%; display:flex; margin-bottom: 50px; border-bottom: 1px solid #ccc;">
  <header style="width: 100%; max-width:1200px; margin: 0 auto; height: 80px; display: flex; justify-content: space-between;">
    <div style="background-color: red; display :flex; align-items: center; font-size: 20px">로고자리</div>
    <div style="background-color: blue; display :flex; align-items: center; font-size: 35px">메뉴자리</div>
    <div style="background-color: yellow; display :flex; align-items: center;font-size: 20px">로그인자리</div>
  </header>
</div>
